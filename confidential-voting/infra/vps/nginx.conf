# nginx.conf — Reverse proxy HTTPS vers le frontend FHEVM
# À placer dans /etc/nginx/sites-available/fhevm-vote puis `ln -s ../sites-enabled/fhevm-vote`

# Redirection HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name vote.mondomaine.xyz;

    # Pour certbot --nginx
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vote.mondomaine.xyz;

    # Certificats Let's Encrypt (générés par certbot --nginx)
    ssl_certificate /etc/letsencrypt/live/vote.mondomaine.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vote.mondomaine.xyz/privkey.pem;

    # SSL moderne
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Logs
    access_log /var/log/nginx/fhevm-vote.access.log;
    error_log /var/log/nginx/fhevm-vote.error.log;

    # Sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # Limite la taille des uploads (relayer JSON-RPC peut être lourd)
    client_max_body_size 2M;

    # Le frontend
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
